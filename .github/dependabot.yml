version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      routine-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      routine-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: "npm"
    directory: "/vendor/ant-code"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      routine-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]
