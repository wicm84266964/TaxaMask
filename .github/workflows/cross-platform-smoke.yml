name: Cross-platform smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    env:
      QT_QPA_PLATFORM: offscreen
      QT_OPENGL: software
      QT_QUICK_BACKEND: software
      TAXAMASK_ANTCODE_BROWSER_MODE: "1"
      TAXAMASK_REQUIRE_GUI_TESTS: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-torch-cpu.txt
          pip install -r requirements.txt

      - name: Run lightweight tests
        run: |
          python -m unittest tests.test_config_cleanup tests.test_platform_open tests.test_poppler_discovery tests.test_runtime_device tests.test_generic_export_schema tests.test_window_geometry tests.test_path_identity tests.test_agent_context_routes tests.test_embedded_taxonomy_paper_finder tests.test_embedded_skill_bundles tests.test_gui_smoke

  embedded-agent:
    name: Embedded Agent Center
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: vendor/ant-code/package-lock.json
      - name: Install embedded Agent Center dependencies
        working-directory: vendor/ant-code
        run: npm ci --no-audit --no-fund
      - name: Verify embedded Agent Center and Skill registry
        working-directory: vendor/ant-code
        run: |
          npm run verify:release
          npm test

  paper-distill-skill:
    name: Paper Distill Skill bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: skills/paper_distill_skill_bundle_v6_zh/pyproject.toml
      - name: Install Paper Distill Skill bundle
        working-directory: skills/paper_distill_skill_bundle_v6_zh
        run: python -m pip install -e .
      - name: Test Paper Distill Skill bundle
        working-directory: skills/paper_distill_skill_bundle_v6_zh
        run: python -m unittest discover -s tests -p "test_*.py"
